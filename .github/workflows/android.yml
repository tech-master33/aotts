name: Android CI — aotts

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build AOTTS APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Print commit being built
        run: git log -1 --format="%H  %s  (%ci)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and CMake
        run: |
          echo "y" | sdkmanager "ndk;23.1.7779620" "cmake;3.22.1"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/23.1.7779620" >> $GITHUB_ENV

      - name: Download SVOX Pico native source from AOSP
        run: |
          mkdir -p src/main/cpp/pico
          git clone --depth=1 \
            https://android.googlesource.com/platform/external/svox \
            /tmp/svox_src
          if [ -d /tmp/svox_src/pico ]; then
            cp -r /tmp/svox_src/pico/* src/main/cpp/pico/
            echo "SVOX Pico source copied"
          else
            echo "ERROR: pico folder not found in SVOX repo"
            ls /tmp/svox_src/
            exit 1
          fi

      - name: Download SVOX Pico language data files
        run: |
          mkdir -p src/main/assets/lang

          SVOX_LANG="https://android.googlesource.com/platform/external/svox/+archive/refs/heads/master/pico/lang.tar.gz"
          curl -L "$SVOX_LANG" -o /tmp/pico_lang.tar.gz 2>/dev/null || true

          if [ -f /tmp/pico_lang.tar.gz ] && [ -s /tmp/pico_lang.tar.gz ]; then
            tar -xzf /tmp/pico_lang.tar.gz -C src/main/assets/lang/ 2>/dev/null || true
            echo "Extracted from AOSP tarball"
          fi

          if [ -z "$(ls -A src/main/assets/lang/*.bin 2>/dev/null)" ]; then
            git clone --depth=1 --filter=blob:none --sparse \
              https://android.googlesource.com/platform/external/svox \
              /tmp/svox_lang || true
            if [ -d /tmp/svox_lang ]; then
              git -C /tmp/svox_lang sparse-checkout set pico/lang
              git -C /tmp/svox_lang checkout || true
              find /tmp/svox_lang/pico/lang -name "*.bin" \
                -exec cp {} src/main/assets/lang/ \; 2>/dev/null || true
            fi
          fi

          echo "Language files:"
          ls -lh src/main/assets/lang/ || echo "WARNING: no .bin files — TTS will have no voice data"

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          ./gradlew clean assembleDebug \
            -Pandroid.ndkVersion=23.1.7779620 \
            --no-daemon \
            --stacktrace

      - name: Build release APK (unsigned)
        run: |
          ./gradlew assembleRelease \
            -Pandroid.ndkVersion=23.1.7779620 \
            --no-daemon \
            --stacktrace || echo "Release skipped (needs signing config)"

      - name: Show built APKs
        run: find build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: aotts-debug
          path: build/outputs/apk/debug/
          retention-days: 30
          if-no-files-found: error

      - name: Upload release APK as artifact (if built)
        uses: actions/upload-artifact@v4
        with:
          name: aotts-release
          path: build/outputs/apk/release/
          retention-days: 30
          if-no-files-found: ignore

      # ── Auto-release on every successful push to main ──────────────────
      # Creates a GitHub Release tagged with the build number + commit SHA.
      # The APK is attached directly — always one link to the latest build.
      - name: Create GitHub Release with APK
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}-${{ github.sha }}"
          name: "aotts build ${{ github.run_number }} — ${{ github.sha }}"
          body: |
            Automated build from commit ${{ github.sha }}

            **Commit message:** ${{ github.event.head_commit.message }}

            Includes SVOX Pico language data for:
            English (US/GB), German, Spanish, French, Italian

            ## How to install
            1. Download the APK below
            2. Transfer it to your Android device
            3. Install it (allow unknown sources if prompted)
            4. Go to **Settings → Language & input → Text-to-speech output**
            5. Select **AOTTS Pico** as your engine
          prerelease: true
          files: |
            build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
